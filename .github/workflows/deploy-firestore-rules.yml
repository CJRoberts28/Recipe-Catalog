name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project cmlb-recipes --token "${{ secrets.FIREBASE_TOKEN }}"
